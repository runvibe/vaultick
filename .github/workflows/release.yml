name: Release

on:
    workflow_dispatch:
    push:
        tags:
            - "v*"

permissions:
    contents: write

env:
    CARGO_TERM_COLOR: always
    CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
    version_check:
        name: Resolve version
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.version.outputs.version }}
            tag: ${{ steps.version.outputs.tag }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Resolve workspace version
              id: version
              shell: bash
              run: |
                  set -euo pipefail

                  workspace_version="$(
                    awk '
                      /^\[workspace\.package\]$/ { in_section=1; next }
                      /^\[/ { in_section=0 }
                      in_section && /^version[[:space:]]*=/ {
                        match($0, /"([^"]+)"/, m)
                        if (m[1] != "") {
                          print m[1]
                          exit
                        }
                      }
                    ' Cargo.toml
                  )"

                  if [ -z "${workspace_version}" ]; then
                    echo "::error::Could not resolve [workspace.package].version from Cargo.toml"
                    exit 1
                  fi

                  if [ "${GITHUB_REF_TYPE}" = "tag" ] && [ "${GITHUB_REF_NAME}" != "v${workspace_version}" ]; then
                    echo "::error::Tag ${GITHUB_REF_NAME} does not match workspace version v${workspace_version}"
                    exit 1
                  fi

                  echo "version=${workspace_version}" >> "${GITHUB_OUTPUT}"
                  echo "tag=v${workspace_version}" >> "${GITHUB_OUTPUT}"

    tag_release:
        name: Create git tag
        if: github.ref_type != 'tag'
        needs: version_check
        runs-on: ubuntu-latest
        env:
            TAG: ${{ needs.version_check.outputs.tag }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Create tag if missing
              shell: bash
              run: |
                  set -euo pipefail
                  git fetch --tags

                  if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
                    echo "Tag ${TAG} already exists on remote, skipping creation."
                    exit 0
                  fi

                  git config user.name "github-actions"
                  git config user.email "github-actions@github.com"
                  git tag "${TAG}"
                  git push origin "refs/tags/${TAG}"

    build_binaries:
        name: Build binary (${{ matrix.name }})
        needs: [version_check, tag_release]
        if: always() && needs.version_check.result == 'success' && (needs.tag_release.result == 'success' || needs.tag_release.result == 'skipped')
        runs-on: ${{ matrix.runs_on }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - name: linux-amd64
                      runs_on: ubuntu-latest
                      target: x86_64-unknown-linux-gnu
                      os_slug: linux
                      arch_slug: amd64
                      exe_ext: ""
                      use_cross: false
                    - name: linux-arm64
                      runs_on: ubuntu-latest
                      target: aarch64-unknown-linux-gnu
                      os_slug: linux
                      arch_slug: arm64
                      exe_ext: ""
                      use_cross: true
                    - name: macos-amd64
                      runs_on: macos-13
                      target: x86_64-apple-darwin
                      os_slug: macos
                      arch_slug: amd64
                      exe_ext: ""
                      use_cross: false
                    - name: macos-arm64
                      runs_on: macos-14
                      target: aarch64-apple-darwin
                      os_slug: macos
                      arch_slug: arm64
                      exe_ext: ""
                      use_cross: false
                    - name: windows-amd64
                      runs_on: windows-latest
                      target: x86_64-pc-windows-msvc
                      os_slug: windows
                      arch_slug: amd64
                      exe_ext: ".exe"
                      use_cross: false
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Setup QEMU
              if: matrix.use_cross == true
              uses: docker/setup-qemu-action@v3

            - name: Setup Buildx
              if: matrix.use_cross == true
              uses: docker/setup-buildx-action@v3

            - name: Install cross
              if: matrix.use_cross == true
              shell: bash
              run: cargo install cross --locked

            - name: Build vaultick
              shell: bash
              run: |
                  set -euo pipefail
                  if [ "${{ matrix.use_cross }}" = "true" ]; then
                    cross build --release --target "${{ matrix.target }}" -p vaultick
                  else
                    cargo build --release --target "${{ matrix.target }}" -p vaultick
                  fi

            - name: Prepare release asset
              shell: bash
              run: |
                  set -euo pipefail
                  mkdir -p dist
                  src="target/${{ matrix.target }}/release/vaultick${{ matrix.exe_ext }}"
                  asset="vaultick-${{ matrix.os_slug }}-${{ matrix.arch_slug }}${{ matrix.exe_ext }}"
                  cp "${src}" "dist/${asset}"

            - name: Upload release asset
              uses: actions/upload-artifact@v4
              with:
                  name: release-${{ matrix.name }}
                  path: dist/*
                  if-no-files-found: error

    github_release:
        name: Publish GitHub release
        needs: [version_check, build_binaries]
        runs-on: ubuntu-latest
        steps:
            - name: Download release artifacts
              uses: actions/download-artifact@v4
              with:
                  pattern: release-*
                  merge-multiple: true
                  path: release-assets

            - name: Create release and upload binaries
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ needs.version_check.outputs.tag }}
                  name: Release ${{ needs.version_check.outputs.tag }}
                  files: release-assets/*
                  draft: false
                  prerelease: false
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    publish_crates:
        name: Publish crates.io packages
        needs: [version_check, build_binaries]
        runs-on: ubuntu-latest
        if: env.CARGO_REGISTRY_TOKEN != ''
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Publish vaultick-lib
              shell: bash
              run: |
                  set -euo pipefail
                  set +e
                  output="$(cargo publish -p vaultick-lib --no-verify 2>&1)"
                  status=$?
                  set -e
                  echo "${output}"
                  if [ ${status} -ne 0 ] && ! echo "${output}" | grep -q "already exists on crates.io index"; then
                    exit ${status}
                  fi

            - name: Wait for vaultick-lib indexing
              shell: bash
              run: sleep 30

            - name: Publish vaultick
              shell: bash
              run: |
                  set -euo pipefail
                  set +e
                  output="$(cargo publish -p vaultick --no-verify 2>&1)"
                  status=$?
                  set -e
                  echo "${output}"
                  if [ ${status} -ne 0 ] && ! echo "${output}" | grep -q "already exists on crates.io index"; then
                    exit ${status}
                  fi
