name: Release Binaries, Docker Images and Crates

on:
    workflow_dispatch:

permissions:
    contents: write
    packages: write

env:
    CARGO_TERM_COLOR: always
    CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
    version_check:
        name: Resolve And Validate Version
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.version.outputs.version }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Resolve root workspace version
              id: version
              shell: bash
              run: |
                  set -euo pipefail

                  workspace_version="$(
                    awk '
                      /^\[workspace\.package\]$/ { in_section=1; next }
                      /^\[/ { in_section=0 }
                      in_section && /^version[[:space:]]*=/ {
                        match($0, /"([^"]+)"/, m)
                        if (m[1] != "") {
                          print m[1]
                          exit
                        }
                      }
                    ' Cargo.toml
                  )"

                  if [ -z "${workspace_version}" ]; then
                    echo "::error::Could not resolve [workspace.package].version from Cargo.toml"
                    exit 1
                  fi

                  echo "workspace=${workspace_version}"

                  echo "version=${workspace_version}" >> "${GITHUB_OUTPUT}"

    build_binaries:
        name: Build binaries (${{ matrix.name }})
        needs: [version_check, tag_release]
        runs-on: ${{ matrix.runs_on }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - name: linux-amd64
                      runs_on: ubuntu-latest
                      target: x86_64-unknown-linux-gnu
                      os_slug: linux
                      arch_slug: amd64
                      exe_ext: ""
                      use_cross: false
                      build_runner: true
                      build_main: true
                      build_ctl: true
                    - name: linux-arm64
                      runs_on: ubuntu-latest
                      target: aarch64-unknown-linux-gnu
                      os_slug: linux
                      arch_slug: arm64
                      exe_ext: ""
                      use_cross: true
                      build_runner: true
                      build_main: true
                      build_ctl: true
                    - name: macos-amd64
                      runs_on: macos-13
                      target: x86_64-apple-darwin
                      os_slug: macos
                      arch_slug: amd64
                      exe_ext: ""
                      use_cross: false
                      build_runner: false
                      build_main: false
                      build_ctl: true
                    - name: macos-arm64
                      runs_on: macos-14
                      target: aarch64-apple-darwin
                      os_slug: macos
                      arch_slug: arm64
                      exe_ext: ""
                      use_cross: false
                      build_runner: false
                      build_main: false
                      build_ctl: true
                    - name: windows-amd64
                      runs_on: windows-latest
                      target: x86_64-pc-windows-msvc
                      os_slug: windows
                      arch_slug: amd64
                      exe_ext: ".exe"
                      use_cross: false
                      build_runner: false
                      build_main: false
                      build_ctl: true
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Setup QEMU
              if: matrix.use_cross == true
              uses: docker/setup-qemu-action@v3

            - name: Setup Buildx
              if: matrix.use_cross == true
              uses: docker/setup-buildx-action@v3

            - name: Install cross
              if: matrix.use_cross == true
              shell: bash
              run: cargo install cross --locked

            - name: Build selected binaries
              shell: bash
              run: |
                  set -euo pipefail
                  if [ "${{ matrix.use_cross }}" = "true" ]; then
                    if [ "${{ matrix.build_runner }}" = "true" ]; then
                      cross build --release --target "${{ matrix.target }}" -p previa-runner
                    fi
                    if [ "${{ matrix.build_main }}" = "true" ]; then
                      cross build --release --target "${{ matrix.target }}" -p previa-main
                    fi
                    if [ "${{ matrix.build_ctl }}" = "true" ]; then
                      cross build --release --target "${{ matrix.target }}" -p previactl
                    fi
                  else
                    if [ "${{ matrix.build_runner }}" = "true" ]; then
                      cargo build --release --target "${{ matrix.target }}" -p previa-runner
                    fi
                    if [ "${{ matrix.build_main }}" = "true" ]; then
                      cargo build --release --target "${{ matrix.target }}" -p previa-main
                    fi
                    if [ "${{ matrix.build_ctl }}" = "true" ]; then
                      cargo build --release --target "${{ matrix.target }}" -p previactl
                    fi
                  fi

            - name: Prepare release assets
              shell: bash
              run: |
                  set -euo pipefail

                  mkdir -p dist
                  if [ "${{ matrix.build_main }}" = "true" ]; then
                    main_src="target/${{ matrix.target }}/release/previa-main${{ matrix.exe_ext }}"
                    main_asset="previa-main-${{ matrix.os_slug }}-${{ matrix.arch_slug }}${{ matrix.exe_ext }}"
                    cp "${main_src}" "dist/${main_asset}"
                  fi

                  if [ "${{ matrix.build_runner }}" = "true" ]; then
                    runner_src="target/${{ matrix.target }}/release/previa-runner${{ matrix.exe_ext }}"
                    runner_asset="previa-runner-${{ matrix.os_slug }}-${{ matrix.arch_slug }}${{ matrix.exe_ext }}"
                    cp "${runner_src}" "dist/${runner_asset}"
                  fi

                  if [ "${{ matrix.build_ctl }}" = "true" ]; then
                    ctl_src="target/${{ matrix.target }}/release/previactl${{ matrix.exe_ext }}"
                    ctl_asset="previactl-${{ matrix.os_slug }}-${{ matrix.arch_slug }}${{ matrix.exe_ext }}"
                    cp "${ctl_src}" "dist/${ctl_asset}"
                  fi

            - name: Upload release assets
              uses: actions/upload-artifact@v4
              with:
                  name: release-${{ matrix.name }}
                  path: dist/*
                  if-no-files-found: error

    upload_r2_artifacts:
        name: Upload release artifacts to Cloudflare R2
        needs: [version_check, build_binaries]
        runs-on: ubuntu-latest
        env:
            VERSION: ${{ needs.version_check.outputs.version }}
            AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
            AWS_REGION: auto
            R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
            R2_ENDPOINT: ${{ secrets.R2_S3_API || secrets.R2_ENPOINT }}
            R2_BUCKET: ${{ vars.R2_BUCKET || secrets.R2_BUCKET || vars.CLOUDFLARE_R2_BUCKET || secrets.CLOUDFLARE_R2_BUCKET }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Download all release artifacts
              uses: actions/download-artifact@v4
              with:
                  pattern: release-*
                  merge-multiple: true
                  path: release-assets

            - name: Upload artifacts to R2
              shell: bash
              run: |
                  set -euo pipefail

                  : "${R2_BUCKET:?Missing var/secret R2_BUCKET (or CLOUDFLARE_R2_BUCKET fallback)}"
                  : "${AWS_ACCESS_KEY_ID:?Missing secret R2_ACCESS_KEY_ID}"
                  : "${AWS_SECRET_ACCESS_KEY:?Missing secret R2_SECRET_ACCESS_KEY}"
                  : "${VERSION:?Missing resolved release version}"

                  if [ -n "${R2_ENDPOINT:-}" ]; then
                    endpoint="${R2_ENDPOINT}"
                  else
                    : "${R2_ACCOUNT_ID:?Missing secret R2_ACCOUNT_ID when R2_S3_API/R2_ENPOINT is not set}"
                    endpoint="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
                  fi

                  shopt -s nullglob
                  files=(release-assets/*)
                  if [ ${#files[@]} -eq 0 ]; then
                    echo "::error::No release assets found to upload"
                    exit 1
                  fi

                  for file in "${files[@]}"; do
                    filename="$(basename "${file}")"
                    key="${VERSION}/files/${filename}"
                    echo "Uploading ${file} to s3://${R2_BUCKET}/${key}"
                    aws s3 cp "${file}" "s3://${R2_BUCKET}/${key}" --endpoint-url "${endpoint}" --no-progress
                  done

            - name: Publish latest manifest to R2
              shell: bash
              run: |
                  set -euo pipefail

                  : "${R2_BUCKET:?Missing var/secret R2_BUCKET (or CLOUDFLARE_R2_BUCKET fallback)}"
                  : "${VERSION:?Missing resolved release version}"

                  if [ -n "${R2_ENDPOINT:-}" ]; then
                    endpoint="${R2_ENDPOINT}"
                  else
                    : "${R2_ACCOUNT_ID:?Missing secret R2_ACCOUNT_ID when R2_S3_API/R2_ENPOINT is not set}"
                    endpoint="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
                  fi

                  shopt -s nullglob
                  files=(release-assets/*)
                  if [ ${#files[@]} -eq 0 ]; then
                    echo "::error::No release assets found to generate manifest"
                    exit 1
                  fi

                  created_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
                  links_json=""

                  for file in "${files[@]}"; do
                    filename="$(basename "${file}")"
                    link_key="${filename%.exe}"
                    link_key="${link_key//-/_}"
                    link_value="https://downloads.previa.dev/${VERSION}/files/${filename}"

                    if [ -n "${links_json}" ]; then
                      links_json="${links_json},"
                    fi

                    links_json="${links_json}\"${link_key}\":\"${link_value}\""
                  done

                  cat > latest.json <<EOF
                  {"name":"previa","version":"${VERSION}","create_at":"${created_at}","links":{${links_json}}}
                  EOF

                  echo "Uploading latest.json to s3://${R2_BUCKET}/latest.json"
                  aws s3 cp latest.json "s3://${R2_BUCKET}/latest.json" --endpoint-url "${endpoint}" --no-progress

            - name: Publish install scripts to R2
              shell: bash
              run: |
                  set -euo pipefail

                  : "${R2_BUCKET:?Missing var/secret R2_BUCKET (or CLOUDFLARE_R2_BUCKET fallback)}"

                  if [ -n "${R2_ENDPOINT:-}" ]; then
                    endpoint="${R2_ENDPOINT}"
                  else
                    : "${R2_ACCOUNT_ID:?Missing secret R2_ACCOUNT_ID when R2_S3_API/R2_ENPOINT is not set}"
                    endpoint="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
                  fi

                  echo "Uploading install.sh to s3://${R2_BUCKET}/install.sh"
                  aws s3 cp install.sh "s3://${R2_BUCKET}/install.sh" --endpoint-url "${endpoint}" --no-progress

    tag_release:
        name: Create git tag
        needs: version_check
        runs-on: ubuntu-latest
        env:
            VERSION: ${{ needs.version_check.outputs.version }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Create tag if missing
              shell: bash
              run: |
                  set -euo pipefail
                  tag="v${VERSION}"
                  git fetch --tags

                  if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
                    echo "Tag ${tag} already exists on remote, skipping creation."
                    exit 0
                  fi

                  git config user.name "github-actions"
                  git config user.email "github-actions@github.com"
                  git tag "${tag}"
                  if git push origin "refs/tags/${tag}"; then
                    echo "Tag ${tag} created and pushed."
                  elif git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
                    echo "Tag ${tag} was created concurrently, continuing."
                  else
                    echo "::error::Failed to push tag ${tag}"
                    exit 1
                  fi

    github_release:
        name: Publish GitHub Release
        needs: [version_check, tag_release, build_binaries]
        runs-on: ubuntu-latest
        steps:
            - name: Download all release artifacts
              uses: actions/download-artifact@v4
              with:
                  pattern: release-*
                  merge-multiple: true
                  path: release-assets

            - name: Create release and upload binaries
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: v${{ needs.version_check.outputs.version }}
                  name: Release v${{ needs.version_check.outputs.version }}
                  files: release-assets/*
                  draft: false
                  prerelease: false
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    docker_build_arch:
        name: Build and push Docker (${{ matrix.service }}-${{ matrix.arch }})
        needs: [version_check, build_binaries]
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - service: previa-runner
                      image: cloudvibedev/previa-runner
                      arch: amd64
                    - service: previa-runner
                      image: cloudvibedev/previa-runner
                      arch: arm64
                    - service: previa-main
                      image: cloudvibedev/previa-main
                      arch: amd64
                    - service: previa-main
                      image: cloudvibedev/previa-main
                      arch: arm64
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Download Linux binaries artifact
              uses: actions/download-artifact@v4
              with:
                  name: release-linux-${{ matrix.arch }}
                  path: downloaded

            - name: Prepare Docker artifact layout
              shell: bash
              run: |
                  set -euo pipefail

                  src_file="${{ matrix.service }}-linux-${{ matrix.arch }}"
                  mkdir -p "artifacts/${{ matrix.service }}/${{ matrix.arch }}"
                  cp "downloaded/${src_file}" "artifacts/${{ matrix.service }}/${{ matrix.arch }}/${{ matrix.service }}"
                  chmod +x "artifacts/${{ matrix.service }}/${{ matrix.arch }}/${{ matrix.service }}"

            - name: Setup QEMU
              uses: docker/setup-qemu-action@v3

            - name: Setup Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build and push image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  file: ./Dockerfile.artifact
                  platforms: linux/${{ matrix.arch }}
                  push: true
                  tags: |
                      ${{ matrix.image }}:latest-${{ matrix.arch }}
                      ${{ matrix.image }}:${{ needs.version_check.outputs.version }}-${{ matrix.arch }}
                  build-args: |
                      BIN_NAME=${{ matrix.service }}
                      TARGETARCH=${{ matrix.arch }}
                      ARTIFACT_ROOT=artifacts
                  cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}
                  cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.arch }}

    docker_manifest:
        name: Create Docker manifests
        needs: [version_check, docker_build_arch]
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - image: cloudvibedev/previa-main
                    - image: cloudvibedev/previa-runner
        steps:
            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Create manifest
              shell: bash
              env:
                  VERSION: ${{ needs.version_check.outputs.version }}
              run: |
                  set -euo pipefail
                  image="${{ matrix.image }}"

                  docker buildx imagetools create \
                    -t "${image}:latest" \
                    -t "${image}:${VERSION}" \
                    "${image}:latest-amd64" \
                    "${image}:latest-arm64" \
                    "${image}:${VERSION}-amd64" \
                    "${image}:${VERSION}-arm64"

    publish_crates:
        name: Publish crates.io packages
        needs: [version_check, build_binaries]
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Package previa-engine
              shell: bash
              run: cargo package -p previa-engine --allow-dirty --no-verify

            - name: Publish previa-engine
              shell: bash
              run: |
                  set -euo pipefail
                  set +e
                  output="$(cargo publish -p previa-engine --no-verify 2>&1)"
                  status=$?
                  set -e
                  echo "${output}"
                  if [ ${status} -ne 0 ]; then
                    if echo "${output}" | grep -q "already exists on crates.io index"; then
                      echo "previa-engine already published at this version, continuing."
                    else
                      exit ${status}
                    fi
                  fi

            - name: Wait for previa-engine indexing
              shell: bash
              run: sleep 30

            - name: Package previa-runner
              shell: bash
              run: cargo package -p previa-runner --allow-dirty --no-verify

            - name: Publish previa-runner
              shell: bash
              run: |
                  set -euo pipefail
                  set +e
                  output="$(cargo publish -p previa-runner --no-verify 2>&1)"
                  status=$?
                  set -e
                  echo "${output}"
                  if [ ${status} -ne 0 ]; then
                    if echo "${output}" | grep -q "already exists on crates.io index"; then
                      echo "previa-runner already published at this version, continuing."
                    else
                      exit ${status}
                    fi
                  fi

            - name: Wait for previa-runner indexing
              shell: bash
              run: sleep 30

            - name: Package previa-main
              shell: bash
              run: cargo package -p previa-main --allow-dirty --no-verify

            - name: Publish previa-main
              shell: bash
              run: |
                  set -euo pipefail
                  set +e
                  output="$(cargo publish -p previa-main --no-verify 2>&1)"
                  status=$?
                  set -e
                  echo "${output}"
                  if [ ${status} -ne 0 ]; then
                    if echo "${output}" | grep -q "already exists on crates.io index"; then
                      echo "previa-main already published at this version, continuing."
                    else
                      exit ${status}
                    fi
                  fi
