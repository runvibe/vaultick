name: Release Binaries, Docker Images and Crates

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_scope:
        description: "Release scope to publish: Linux full, macOS release, Windows release, or all platforms"
        required: true
        default: all
        type: choice
        options:
          - linux
          - mac
          - windows
          - all

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  resolve_version:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve workspace version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          workspace_version="$(
            awk '
              /^\[workspace\.package\]$/ { in_section=1; next }
              /^\[/ { in_section=0 }
              in_section && /^version[[:space:]]*=/ {
                match($0, /"([^"]+)"/, m)
                if (m[1] != "") {
                  print m[1]
                  exit
                }
              }
            ' Cargo.toml
          )"

          if [ -z "${workspace_version}" ]; then
            echo "::error::Could not resolve [workspace.package].version from Cargo.toml"
            exit 1
          fi

          echo "version=${workspace_version}" >> "${GITHUB_OUTPUT}"

      - name: Resolve release tag
        id: tag
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          expected_tag="v${VERSION}"

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            if [ "${GITHUB_REF_NAME}" != "${expected_tag}" ]; then
              echo "::error::Tag ${GITHUB_REF_NAME} does not match workspace version ${expected_tag}"
              exit 1
            fi

            echo "tag=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "tag=${expected_tag}" >> "${GITHUB_OUTPUT}"

  resolve_scope:
    name: Resolve Release Scope
    needs: resolve_version
    runs-on: ubuntu-latest
    outputs:
      release_scope: ${{ steps.scope.outputs.release_scope }}
      build_matrix: ${{ steps.scope.outputs.build_matrix }}
      publish_docker: ${{ steps.scope.outputs.publish_docker }}
      publish_crates: ${{ steps.scope.outputs.publish_crates }}
      publish_metadata: ${{ steps.scope.outputs.publish_metadata }}
      publish_github_release: ${{ steps.scope.outputs.publish_github_release }}
    steps:
      - name: Normalize release scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            scope="${{ inputs.release_scope }}"
          else
            scope="all"
          fi

          linux_matrix='[
            {"name":"linux-amd64","artifact_name":"release-linux-amd64","runs_on":"ubuntu-latest","target":"x86_64-unknown-linux-gnu","os_slug":"linux","arch_slug":"amd64","exe_ext":"","use_cross":false,"build_proxy":true},
            {"name":"linux-arm64","artifact_name":"release-linux-arm64","runs_on":"ubuntu-latest","target":"aarch64-unknown-linux-gnu","os_slug":"linux","arch_slug":"arm64","exe_ext":"","use_cross":true,"build_proxy":true}
          ]'
          mac_matrix='[
            {"name":"macos-amd64","artifact_name":"release-macos-amd64","runs_on":"macos-latest","target":"x86_64-apple-darwin","os_slug":"macos","arch_slug":"amd64","exe_ext":"","use_cross":false,"build_proxy":false}
          ]'
          windows_matrix='[
            {"name":"windows-amd64","artifact_name":"release-windows-amd64","runs_on":"windows-latest","target":"x86_64-pc-windows-msvc","os_slug":"windows","arch_slug":"amd64","exe_ext":".exe","use_cross":false,"build_proxy":false}
          ]'

          case "${scope}" in
            linux)
              publish_docker=true
              publish_crates=true
              publish_metadata=true
              build_matrix="${linux_matrix}"
              ;;
            mac)
              publish_docker=false
              publish_crates=false
              publish_metadata=false
              build_matrix="${mac_matrix}"
              ;;
            windows)
              publish_docker=false
              publish_crates=false
              publish_metadata=false
              build_matrix="${windows_matrix}"
              ;;
            all)
              publish_docker=true
              publish_crates=true
              publish_metadata=true
              build_matrix='[
                {"name":"linux-amd64","artifact_name":"release-linux-amd64","runs_on":"ubuntu-latest","target":"x86_64-unknown-linux-gnu","os_slug":"linux","arch_slug":"amd64","exe_ext":"","use_cross":false,"build_proxy":true},
                {"name":"linux-arm64","artifact_name":"release-linux-arm64","runs_on":"ubuntu-latest","target":"aarch64-unknown-linux-gnu","os_slug":"linux","arch_slug":"arm64","exe_ext":"","use_cross":true,"build_proxy":true},
                {"name":"macos-amd64","artifact_name":"release-macos-amd64","runs_on":"macos-latest","target":"x86_64-apple-darwin","os_slug":"macos","arch_slug":"amd64","exe_ext":"","use_cross":false,"build_proxy":false},
                {"name":"windows-amd64","artifact_name":"release-windows-amd64","runs_on":"windows-latest","target":"x86_64-pc-windows-msvc","os_slug":"windows","arch_slug":"amd64","exe_ext":".exe","use_cross":false,"build_proxy":false}
              ]'
              ;;
            *)
              echo "::error::Unsupported release scope: ${scope}"
              exit 1
              ;;
          esac

          {
            echo "release_scope=${scope}"
            echo "build_matrix<<EOF"
            echo "${build_matrix}"
            echo "EOF"
            echo "publish_docker=${publish_docker}"
            echo "publish_crates=${publish_crates}"
            echo "publish_metadata=${publish_metadata}"
            echo "publish_github_release=true"
          } >> "${GITHUB_OUTPUT}"

  ensure_tag:
    name: Ensure Release Tag
    needs: resolve_version
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ needs.resolve_version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag if missing
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG_NAME}" >/dev/null 2>&1; then
            echo "Tag ${TAG_NAME} already exists on remote, skipping creation."
            exit 0
          fi

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "${TAG_NAME}"

          if git push origin "refs/tags/${TAG_NAME}"; then
            echo "Tag ${TAG_NAME} created and pushed."
          elif git ls-remote --exit-code --tags origin "refs/tags/${TAG_NAME}" >/dev/null 2>&1; then
            echo "Tag ${TAG_NAME} was created concurrently, continuing."
          else
            echo "::error::Failed to push tag ${TAG_NAME}"
            exit 1
          fi

  build_release_binaries:
    name: Build Release Binaries (${{ matrix.name }})
    needs: [resolve_version, resolve_scope, ensure_tag]
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.resolve_scope.outputs.build_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup QEMU
        if: matrix.use_cross == true
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        if: matrix.use_cross == true
        uses: docker/setup-buildx-action@v3

      - name: Install cross
        if: matrix.use_cross == true
        shell: bash
        run: cargo install cross --locked

      - name: Build selected binaries
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ matrix.use_cross }}" = "true" ]; then
            if [ "${{ matrix.build_proxy }}" = "true" ]; then
              cross build --release --target "${{ matrix.target }}" \
                -p vaultick-bin \
                -p vaultick-proxy
            else
              cross build --release --target "${{ matrix.target }}" \
                -p vaultick-bin
            fi
          else
            if [ "${{ matrix.build_proxy }}" = "true" ]; then
              cargo build --release --target "${{ matrix.target }}" \
                -p vaultick-bin \
                -p vaultick-proxy
            else
              cargo build --release --target "${{ matrix.target }}" \
                -p vaultick-bin
            fi
          fi

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist

          cp "target/${{ matrix.target }}/release/vaultick${{ matrix.exe_ext }}" \
            "dist/vaultick-${{ matrix.os_slug }}-${{ matrix.arch_slug }}${{ matrix.exe_ext }}"

          if [ "${{ matrix.build_proxy }}" = "true" ]; then
            cp "target/${{ matrix.target }}/release/vaultick-proxy${{ matrix.exe_ext }}" \
              "dist/vaultick-proxy-${{ matrix.os_slug }}-${{ matrix.arch_slug }}${{ matrix.exe_ext }}"
          fi

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*
          if-no-files-found: error

  github_release:
    name: Publish GitHub Release
    if: needs.resolve_scope.outputs.publish_github_release == 'true'
    needs: [resolve_version, resolve_scope, ensure_tag, build_release_binaries]
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets

      - name: Create release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve_version.outputs.tag }}
          name: Release ${{ needs.resolve_version.outputs.tag }}
          files: release-assets/*
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish_release_metadata:
    name: Publish Release Metadata
    if: needs.resolve_scope.outputs.publish_metadata == 'true'
    needs: [resolve_version, resolve_scope, ensure_tag, github_release]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.resolve_version.outputs.version }}
      RELEASE_SCOPE: ${{ needs.resolve_scope.outputs.release_scope }}
      REPOSITORY: ${{ github.repository }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: refs/heads/main
          fetch-depth: 0

      - name: Validate installer script
        shell: bash
        run: |
          set -euo pipefail
          sh -n install.sh

      - name: Generate release metadata
        shell: bash
        run: |
          set -euo pipefail

          export PUBLISHED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          python scripts/generate_release_metadata.py

      - name: Validate release metadata
        shell: bash
        run: |
          set -euo pipefail
          python -m json.tool release-metadata.json >/dev/null

      - name: Commit release metadata
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- release-metadata.json; then
            echo "release-metadata.json already up to date."
            exit 0
          fi

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add release-metadata.json
          git commit -m "ci: update release metadata for v${VERSION}"
          git pull --rebase origin main
          git push origin HEAD:main

  publish_proxy_images:
    name: Publish Proxy Image (${{ matrix.arch }})
    if: needs.resolve_scope.outputs.publish_docker == 'true'
    needs: [resolve_version, resolve_scope, ensure_tag, build_release_binaries]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: release-linux-${{ matrix.arch }}
          path: downloaded

      - name: Prepare Docker artifact layout
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "artifacts/vaultick-proxy/${{ matrix.arch }}"
          cp "downloaded/vaultick-proxy-linux-${{ matrix.arch }}" \
            "artifacts/vaultick-proxy/${{ matrix.arch }}/vaultick-proxy"
          chmod +x "artifacts/vaultick-proxy/${{ matrix.arch }}/vaultick-proxy"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/vaultick-proxy
          tags: |
            type=raw,value=latest-${{ matrix.arch }}
            type=raw,value=${{ needs.resolve_version.outputs.version }}-${{ matrix.arch }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./vaultick-proxy/Dockerfile.artifact
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ARTIFACT_ROOT=artifacts
            TARGETARCH=${{ matrix.arch }}
            BIN_NAME=vaultick-proxy
          cache-from: type=gha,scope=vaultick-proxy-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=vaultick-proxy-${{ matrix.arch }}

  publish_proxy_manifest:
    name: Publish Proxy Image Manifest
    if: needs.resolve_scope.outputs.publish_docker == 'true'
    needs: [resolve_version, resolve_scope, publish_proxy_images]
    runs-on: ubuntu-latest
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        shell: bash
        env:
          VERSION: ${{ needs.resolve_version.outputs.version }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/vaultick-proxy
        run: |
          set -euo pipefail

          docker buildx imagetools create \
            -t "${IMAGE}:latest" \
            -t "${IMAGE}:${VERSION}" \
            "${IMAGE}:latest-amd64" \
            "${IMAGE}:latest-arm64" \
            "${IMAGE}:${VERSION}-amd64" \
            "${IMAGE}:${VERSION}-arm64"

  publish_crates:
    name: Publish Crates.io Packages
    if: needs.resolve_scope.outputs.publish_crates == 'true'
    needs: [resolve_version, resolve_scope, ensure_tag]
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Check crates.io token
        id: token
        shell: bash
        run: |
          if [ -n "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "has_token=true" >> "${GITHUB_OUTPUT}"
          else
            echo "has_token=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Skip crates publish when token is missing
        if: steps.token.outputs.has_token != 'true'
        run: echo "CARGO_REGISTRY_TOKEN is not configured; skipping crates.io publish."

      - name: Checkout
        if: steps.token.outputs.has_token == 'true'
        uses: actions/checkout@v4

      - name: Setup Rust
        if: steps.token.outputs.has_token == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Publish crates in dependency order
        if: steps.token.outputs.has_token == 'true'
        shell: bash
        run: |
          set -euo pipefail

          publish_crate() {
            crate="$1"

            cargo package -p "${crate}" --allow-dirty --no-verify

            set +e
            output="$(cargo publish -p "${crate}" --no-verify 2>&1)"
            status=$?
            set -e

            echo "${output}"

            if [ ${status} -ne 0 ]; then
              if echo "${output}" | grep -q "already exists on crates.io index"; then
                echo "${crate} already published at this version, continuing."
              else
                exit ${status}
              fi
            fi
          }

          publish_crate vaultick
          sleep 30
          publish_crate vaultick-request
          sleep 30
          publish_crate vaultick-bin
