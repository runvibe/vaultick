name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  resolve_version:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve workspace version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          workspace_version="$(
            awk '
              /^\[workspace\.package\]$/ { in_section=1; next }
              /^\[/ { in_section=0 }
              in_section && /^version[[:space:]]*=/ {
                match($0, /"([^"]+)"/, m)
                if (m[1] != "") {
                  print m[1]
                  exit
                }
              }
            ' Cargo.toml
          )"

          if [ -z "${workspace_version}" ]; then
            echo "::error::Could not resolve [workspace.package].version from Cargo.toml"
            exit 1
          fi

          echo "version=${workspace_version}" >> "${GITHUB_OUTPUT}"

      - name: Resolve release tag
        id: tag
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          expected_tag="v${VERSION}"

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            if [ "${GITHUB_REF_NAME}" != "${expected_tag}" ]; then
              echo "::error::Tag ${GITHUB_REF_NAME} does not match workspace version ${expected_tag}"
              exit 1
            fi

            echo "tag=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "tag=${expected_tag}" >> "${GITHUB_OUTPUT}"

  ensure_tag:
    name: Ensure Release Tag
    needs: resolve_version
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ needs.resolve_version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag if missing
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG_NAME}" >/dev/null 2>&1; then
            echo "Tag ${TAG_NAME} already exists on remote, skipping creation."
            exit 0
          fi

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "${TAG_NAME}"

          if git push origin "refs/tags/${TAG_NAME}"; then
            echo "Tag ${TAG_NAME} created and pushed."
          elif git ls-remote --exit-code --tags origin "refs/tags/${TAG_NAME}" >/dev/null 2>&1; then
            echo "Tag ${TAG_NAME} was created concurrently, continuing."
          else
            echo "::error::Failed to push tag ${TAG_NAME}"
            exit 1
          fi

  build_release_binaries:
    name: Build Release Binaries (${{ matrix.name }})
    needs: [resolve_version, ensure_tag]
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runs_on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            os_slug: linux
            arch: amd64
            exe_ext: ""
            use_cross: false
            build_proxy: true
          - name: linux-arm64
            runs_on: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            os_slug: linux
            arch: arm64
            exe_ext: ""
            use_cross: true
            build_proxy: true
          - name: windows-amd64
            runs_on: windows-latest
            target: x86_64-pc-windows-msvc
            os_slug: windows
            arch: amd64
            exe_ext: ".exe"
            use_cross: false
            build_proxy: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup QEMU
        if: matrix.use_cross == true
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        if: matrix.use_cross == true
        uses: docker/setup-buildx-action@v3

      - name: Install cross
        if: matrix.use_cross == true
        shell: bash
        run: cargo install cross --locked

      - name: Build binaries
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ matrix.use_cross }}" = "true" ]; then
            if [ "${{ matrix.build_proxy }}" = "true" ]; then
              cross build --release --target "${{ matrix.target }}" \
                -p vaultick-bin \
                -p vaultick-proxy
            else
              cross build --release --target "${{ matrix.target }}" \
                -p vaultick-bin
            fi
          else
            if [ "${{ matrix.build_proxy }}" = "true" ]; then
              cargo build --release --target "${{ matrix.target }}" \
                -p vaultick-bin \
                -p vaultick-proxy
            else
              cargo build --release --target "${{ matrix.target }}" \
                -p vaultick-bin
            fi
          fi

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist

          cp "target/${{ matrix.target }}/release/vaultick${{ matrix.exe_ext }}" \
            "dist/vaultick-${{ matrix.os_slug }}-${{ matrix.arch }}${{ matrix.exe_ext }}"

          if [ "${{ matrix.build_proxy }}" = "true" ]; then
            cp "target/${{ matrix.target }}/release/vaultick-proxy${{ matrix.exe_ext }}" \
              "dist/vaultick-proxy-${{ matrix.os_slug }}-${{ matrix.arch }}${{ matrix.exe_ext }}"
          fi

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: dist/*
          if-no-files-found: error

  github_release:
    name: Publish GitHub Release
    needs: [resolve_version, ensure_tag, build_release_binaries]
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets

      - name: Create release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve_version.outputs.tag }}
          name: Release ${{ needs.resolve_version.outputs.tag }}
          files: release-assets/*
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish_downloads_metadata:
    name: Publish Downloads Metadata
    needs: [resolve_version, ensure_tag, build_release_binaries]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.resolve_version.outputs.version }}
      DOWNLOADS_BUCKET: ${{ vars.DOWNLOADS_BUCKET }}
      DOWNLOADS_PUBLIC_BASE_URL: ${{ vars.DOWNLOADS_PUBLIC_BASE_URL }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ENDPOINT_URL: ${{ vars.AWS_ENDPOINT_URL }}
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets

      - name: Validate downloads configuration
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail

          required_env_vars=(
            VERSION
            DOWNLOADS_BUCKET
            DOWNLOADS_PUBLIC_BASE_URL
            AWS_REGION
            AWS_ACCESS_KEY_ID
            AWS_SECRET_ACCESS_KEY
          )

          for var_name in "${required_env_vars[@]}"; do
            if [ -z "${!var_name:-}" ]; then
              echo "::error::Missing required release configuration: ${var_name}"
              exit 1
            fi
          done

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Validate installer script
        shell: bash
        run: |
          set -euo pipefail
          sh -n install.sh

      - name: Generate latest.json
        shell: bash
        run: |
          set -euo pipefail

          base_url="${DOWNLOADS_PUBLIC_BASE_URL%/}"
          create_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          cat > latest.json <<EOF
          {
            "name": "vaultick",
            "version": "${VERSION}",
            "create_at": "${create_at}",
            "links": {
              "vaultick_linux_amd64": "${base_url}/${VERSION}/files/vaultick-linux-amd64",
              "vaultick_linux_arm64": "${base_url}/${VERSION}/files/vaultick-linux-arm64",
              "vaultick_proxy_linux_amd64": "${base_url}/${VERSION}/files/vaultick-proxy-linux-amd64",
              "vaultick_proxy_linux_arm64": "${base_url}/${VERSION}/files/vaultick-proxy-linux-arm64"
            }
          }
          EOF

          export BASE_URL="${base_url}"

          jq -e '
            .name == "vaultick" and
            .version == env.VERSION and
            (.create_at | test("^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$")) and
            .links == {
              "vaultick_linux_amd64": (env.BASE_URL + "/" + env.VERSION + "/files/vaultick-linux-amd64"),
              "vaultick_linux_arm64": (env.BASE_URL + "/" + env.VERSION + "/files/vaultick-linux-arm64"),
              "vaultick_proxy_linux_amd64": (env.BASE_URL + "/" + env.VERSION + "/files/vaultick-proxy-linux-amd64"),
              "vaultick_proxy_linux_arm64": (env.BASE_URL + "/" + env.VERSION + "/files/vaultick-proxy-linux-arm64")
            }
          ' latest.json >/dev/null

      - name: Upload release assets to downloads bucket
        shell: bash
        run: |
          set -euo pipefail

          aws_args=()
          if [ -n "${AWS_ENDPOINT_URL}" ]; then
            aws_args+=(--endpoint-url "${AWS_ENDPOINT_URL}")
          fi

          for asset in \
            vaultick-linux-amd64 \
            vaultick-linux-arm64 \
            vaultick-proxy-linux-amd64 \
            vaultick-proxy-linux-arm64; do
            aws "${aws_args[@]}" s3 cp \
              "release-assets/${asset}" \
              "s3://${DOWNLOADS_BUCKET}/${VERSION}/files/${asset}" \
              --only-show-errors
          done

          aws "${aws_args[@]}" s3 cp \
            latest.json \
            "s3://${DOWNLOADS_BUCKET}/latest.json" \
            --content-type application/json \
            --only-show-errors

          aws "${aws_args[@]}" s3 cp \
            install.sh \
            "s3://${DOWNLOADS_BUCKET}/install.sh" \
            --content-type text/x-shellscript \
            --only-show-errors

  publish_proxy_images:
    name: Publish Proxy Image (${{ matrix.arch }})
    needs: [resolve_version, ensure_tag, build_release_binaries]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: release-linux-${{ matrix.arch }}
          path: downloaded

      - name: Prepare Docker artifact layout
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "artifacts/vaultick-proxy/${{ matrix.arch }}"
          cp "downloaded/vaultick-proxy-linux-${{ matrix.arch }}" \
            "artifacts/vaultick-proxy/${{ matrix.arch }}/vaultick-proxy"
          chmod +x "artifacts/vaultick-proxy/${{ matrix.arch }}/vaultick-proxy"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/vaultick-proxy
          tags: |
            type=raw,value=latest-${{ matrix.arch }}
            type=raw,value=${{ needs.resolve_version.outputs.version }}-${{ matrix.arch }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./vaultick-proxy/Dockerfile.artifact
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ARTIFACT_ROOT=artifacts
            TARGETARCH=${{ matrix.arch }}
            BIN_NAME=vaultick-proxy
          cache-from: type=gha,scope=vaultick-proxy-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=vaultick-proxy-${{ matrix.arch }}

  publish_proxy_manifest:
    name: Publish Proxy Image Manifest
    needs: [resolve_version, publish_proxy_images]
    runs-on: ubuntu-latest
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        shell: bash
        env:
          VERSION: ${{ needs.resolve_version.outputs.version }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/vaultick-proxy
        run: |
          set -euo pipefail

          docker buildx imagetools create \
            -t "${IMAGE}:latest" \
            -t "${IMAGE}:${VERSION}" \
            "${IMAGE}:latest-amd64" \
            "${IMAGE}:latest-arm64" \
            "${IMAGE}:${VERSION}-amd64" \
            "${IMAGE}:${VERSION}-arm64"

  publish_crates:
    name: Publish Crates.io Packages
    needs: [resolve_version, ensure_tag]
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Check crates.io token
        id: token
        shell: bash
        run: |
          if [ -n "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "has_token=true" >> "${GITHUB_OUTPUT}"
          else
            echo "has_token=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Skip crates publish when token is missing
        if: steps.token.outputs.has_token != 'true'
        run: echo "CARGO_REGISTRY_TOKEN is not configured; skipping crates.io publish."

      - name: Checkout
        if: steps.token.outputs.has_token == 'true'
        uses: actions/checkout@v4

      - name: Setup Rust
        if: steps.token.outputs.has_token == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Publish crates in dependency order
        if: steps.token.outputs.has_token == 'true'
        shell: bash
        run: |
          set -euo pipefail

          publish_crate() {
            crate="$1"

            cargo package -p "${crate}" --allow-dirty --no-verify

            set +e
            output="$(cargo publish -p "${crate}" --no-verify 2>&1)"
            status=$?
            set -e

            echo "${output}"

            if [ ${status} -ne 0 ]; then
              if echo "${output}" | grep -q "already exists on crates.io index"; then
                echo "${crate} already published at this version, continuing."
              else
                exit ${status}
              fi
            fi
          }

          publish_crate vaultick
          sleep 30
          publish_crate vaultick-request
          sleep 30
          publish_crate vaultick-bin
